name: Bump Homebrew Formula

on:
  release:
    types: [published] # Triggers automatically whenever you publish a new release tag

jobs:
  bump-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main Voxel repository
        uses: actions/checkout@v4

      - name: Calculate Tarball SHA-256
        id: shasum
        run: |
          # Get the version tag string (e.g., v1.0.0-alpha.2)
          TAG_NAME="${{ github.event.release.tag_name }}"
          URL="https://github.com/Naman1177/Voxel/archive/refs/tags/${TAG_NAME}.tar.gz"
          
          # Download and calculate hash dynamically
          curl -L -o voxel.tar.gz "$URL"
          HASH=$(sha256sum voxel.tar.gz | awk '{print $1}')
          
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "sha256=$HASH" >> $GITHUB_OUTPUT

      - name: Checkout Tap Repository
        uses: actions/checkout@v4
        with:
          repository: 'Naman1177/homebrew-voxel'
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: 'tap'

      - name: Update Formula File
        run: |
          FORMULA_PATH="tap/Formula/voxel.rb"
          
          # Use sed to swap the old URL and SHA256 lines out for the new ones
          sed -i 's|url ".*"|url "${{ steps.shasum.outputs.url }}"|g' $FORMULA_PATH
          sed -i 's|sha256 ".*"|sha256 "${{ steps.shasum.outputs.sha256 }}"|g' $FORMULA_PATH

      - name: Commit and Push Changes to Tap
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/voxel.rb
          git commit -m "Automated Formula Bump to ${{ steps.shasum.outputs.tag }}"
          git push origin main